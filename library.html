<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Library Management System</title>

    <link rel="icon" href="icon/icon.png" />

    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="library.css" />
  </head>

  <body>
    <div class="container">
      <div class="card">
        <h1>Library Management System</h1>

        <div id="authSection">
          <div class="tabs">
            <button id="loginTab" class="active">Login</button>

            <button id="registerTab">Register</button>
          </div>

          <!-- Login Form -->

          <form id="loginForm">
            <div class="input-group">
              <label>Email</label>

              <input
                type="email"
                id="loginEmail"
                placeholder="Enter your email"
                required
              />
            </div>

            <div class="input-group">
              <label>Password</label>

              <input
                type="password"
                id="loginPassword"
                placeholder="Enter your password"
                required
              />
            </div>

            <button type="submit" class="main-btn">Login</button>
          </form>

          <!-- Register Form -->

          <form id="registerForm" class="hidden">
            <div class="input-group">
              <label>Email</label>

              <input
                type="email"
                id="registerEmail"
                placeholder="Enter your email"
                required
              />
            </div>

            <div class="input-group">
              <label>Password</label>

              <input
                type="password"
                id="registerPassword"
                placeholder="Create password"
                required
              />
            </div>

            <div class="input-group">
              <label>Role</label>

              <select id="role">
                <option value="0">Member</option>

                <option value="1">Librarian</option>
              </select>
            </div>

            <button type="submit" class="main-btn">Register</button>
          </form>

          <p class="message"></p>
        </div>
        <!-- Add Book Modal -->

        <div id="addBookModal" class="modal hidden">
          <div class="modal-content">
            <h3>Add New Book</h3>

            <div class="input-group">
              <label>Book ID</label>
              <input type="number" id="modalId" placeholder="Enter book id" />
            </div>

            <div class="input-group">
              <label>Title</label>
              <input type="text" id="modalTitle" />
            </div>

            <div class="input-group">
              <label>Author</label>
              <input type="text" id="modalAuthor" />
            </div>

            <button id="submitAddBook" class="main-btn">Add</button>
            <button id="closeModal" class="logout-btn">Close</button>
            <p id="formError" class="error-text"></p>
          </div>
        </div>

        <!-- Delete Book Modal -->
        <div id="deleteBookModal" class="modal hidden">
          <div class="modal-content">
            <h3>Delete Book</h3>

            <div class="input-group">
              <label>Book ID</label>
              <input
                type="number"
                id="deleteBookId"
                placeholder="Enter book id"
              />
            </div>

            <button id="submitDeleteBook" class="main-btn">Delete</button>
            <button id="closeDeleteModal" class="logout-btn">Close</button>
          </div>
        </div>
        <!-- Dashboard -->

        <div id="dashboard" class="hidden">
          <h2 id="welcome"></h2>

          <div class="dashboard-buttons">
            <button id="borrowBtn" class="main-btn">Borrow Book</button>

            <button id="returnBtn" class="main-btn">Return Book</button>

            <button id="myBooksBtn" class="main-btn">My Books</button>

            <button id="libraryBooksBtn" class="main-btn">Library Books</button>

            <button id="addBookBtn" class="main-btn hidden">Add Book</button>

            <button id="deleteBookBtn" class="main-btn hidden">
              Delete Book
            </button>

            <button id="borrowedListBtn" class="main-btn">
              Borrowed Books
            </button>

            <button id="logoutBtn" class="logout-btn">Logout</button>
          </div>

          <div id="addBookSection" class="hidden">
            <div class="input-group">
              <label>Title</label>
              <input type="text" id="bookTitle" placeholder="Book title" />
            </div>

            <div class="input-group">
              <label>Author</label>
              <input type="text" id="bookAuthor" placeholder="Book author" />
            </div>

            <div class="input-group">
              <label>Genre</label>
              <select id="bookGenre">
                <option value="0">Scientific</option>
                <option value="1">Cultural</option>
                <option value="2">Sports</option>
                <option value="3">Specialized</option>
              </select>
            </div>

            <button id="submitAddBook" class="main-btn">Add Book</button>
          </div>
          <div class="search-box">
            <input
              type="text"
              id="searchInput"
              placeholder="Search book by title..."
            />
            <button id="searchBtn" class="main-btn">Search</button>
          </div>
          <div id="resultBox"></div>
        </div>
      </div>
    </div>

    <script src="library.js"></script>
  </body>
</html>
